experiment_name: colosseum_td3_baseline
seed: 42
device: auto
policy: MlpPolicy
total_timesteps: 100
learning_rate: 0.0003
buffer_size: 10000
learning_starts: 20
batch_size: 16
gamma: 0.99
tau: 0.005
train_freq: 1
gradient_steps: 1
policy_delay: 2
target_policy_noise: 0.2
target_noise_clip: 0.5
action_noise_std:
  - 0.15
  - 0.15
  - 0.05
verbose: 1
checkpoint_interval: 50
save_best_checkpoint: true
model_output_dir: results/trained_models/colosseum_td3_baseline
tensorboard_log_dir: results/logs/colosseum_td3_baseline
reports_dir: results/reports/m12
final_checkpoint_name: final.zip
best_checkpoint_name: best_training_episode.zip
evaluation_episodes: 3
evaluation_policy: td3
env:
  client_module: airsim
  anchor_altitude: 2.0
  min_ground_clearance: 1.0
  workspace_xy_limit: 5.0
  workspace_up_limit: 3.0
  workspace_down_limit: 0.25
  max_horizontal_velocity: 1.0
  max_vertical_velocity: 0.2
  control_duration: 0.5
  anchor_move_velocity: 0.5
  anchor_move_timeout: 20.0
  goal_tolerance: 0.5
  min_goal_distance: 1.0
  max_episode_steps: 40
  default_goal_offset:
    - 3.0
    - 0.0
    - 0.0
  random_goal: false
  progress_reward_scale: 1.0
  step_penalty: -0.02
  action_penalty_scale: 0.01
  success_reward: 10.0
  collision_penalty: -10.0
  out_of_bounds_penalty: -5.0
